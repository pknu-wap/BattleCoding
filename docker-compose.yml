version: "3.8"
services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: battle_coding
      MYSQL_USER: battle
      MYSQL_PASSWORD: battlepw
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: battle-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/battle_coding
      SPRING_DATASOURCE_USERNAME: battle
      SPRING_DATASOURCE_PASSWORD: battlepw
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    container_name: battle-frontend
    ports:
      - "3000:3000"
    stdin_open: true
    tty: true
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  mysql_data:
